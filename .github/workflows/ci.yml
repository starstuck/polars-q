name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -e .

      # Run the full test suite; tee captures output for the coverage report.
      # set -o pipefail propagates pytest's exit code through the pipe.
      - name: Run tests
        run: |
          set -o pipefail
          python -m pytest tests/ -v --tb=short 2>&1 | tee pytest-output.txt

      # Always generate the report, even when tests fail, so you can see
      # which sections regressed.
      - name: Feature coverage report
        if: always()
        run: python scripts/feature_report.py pytest-output.txt >> $GITHUB_STEP_SUMMARY

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ github.run_id }}
          path: pytest-output.txt
          retention-days: 14
